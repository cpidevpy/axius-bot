<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axius Bot — визуальный конструктор</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Inter', sans-serif; background: #f5f7fb; padding: 20px; transition: 0.3s; }
        body.dark { background: #0a0c15; color: #eef3ff; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* хедер */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        h1 { background: linear-gradient(135deg, #6c63ff, #a363d9); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .theme-btn { background: #f0f2f8; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        body.dark .theme-btn { background: #1e233b; color: white; }
        
        /* карточки */
        .card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        body.dark .card { background: #121624; }
        h2 { margin-bottom: 20px; font-size: 1.3rem; }
        h3 { margin: 16px 0 12px; font-size: 1rem; }
        
        /* формы */
        input, textarea, select { width: 100%; padding: 14px; border-radius: 20px; border: 1px solid #eef2f9; margin-bottom: 12px; font-family: inherit; background: white; }
        body.dark input, body.dark textarea, body.dark select { background: #1e233b; border-color: #2a2f48; color: white; }
        button { background: #6c63ff; color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { transform: scale(0.98); }
        .btn-danger { background: #dc3545; }
        .btn-outline { background: transparent; border: 1px solid #6c63ff; color: #6c63ff; }
        
        /* сетка */
        .bots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .bot-card { background: #f8f9ff; border-radius: 20px; padding: 16px; cursor: pointer; transition: 0.2s; }
        body.dark .bot-card { background: #1a1e2c; }
        .bot-card.active { border: 2px solid #6c63ff; background: #6c63ff10; }
        .command-item { background: #f8f9ff; border-radius: 16px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        body.dark .command-item { background: #1a1e2c; }
        .badge { background: #6c63ff20; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        
        /* вкладки */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 8px 20px; border-radius: 30px; cursor: pointer; background: #f0f2f8; }
        body.dark .tab { background: #1e233b; }
        .tab.active { background: #6c63ff; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* кнопки в командах */
        .buttons-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
        .buttons-row input { flex: 1; margin-bottom: 0; }
        
        /* чаты */
        .chat-item { background: #f8f9ff; border-radius: 16px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .message-bubble { background: #6c63ff20; padding: 8px 12px; border-radius: 16px; margin: 4px 0; }
        
        @media (max-width: 768px) { body { padding: 12px; } .card { padding: 16px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🤖 Axius Bot — конструктор ботов</h1>
        <button class="theme-btn" onclick="toggleTheme()">🌓 Тема</button>
    </div>
    
    <!-- Добавление бота -->
    <div class="card">
        <h2>➕ Добавить бота</h2>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <input type="text" id="botName" placeholder="Имя бота" style="flex: 2;">
            <input type="text" id="botToken" placeholder="Токен от @BotFather" style="flex: 3;">
            <button onclick="addBot()">Добавить</button>
        </div>
    </div>
    
    <!-- Список ботов -->
    <div class="card">
        <h2>📋 Мои боты</h2>
        <div class="bots-grid" id="botsList"></div>
    </div>
    
    <!-- Панель управления выбранным ботом -->
    <div class="card" id="botPanel" style="display: none;">
        <h2>⚙️ <span id="selectedBotName"></span></h2>
        
        <div class="tabs">
            <div class="tab active" data-tab="commands">📝 Команды</div>
            <div class="tab" data-tab="profile">👤 Профиль</div>
            <div class="tab" data-tab="chats">💬 Чаты</div>
        </div>
        
        <!-- Вкладка Команды -->
        <div class="tab-content active" id="tab-commands">
            <div id="commandsList"></div>
            <h3>➕ Новая команда</h3>
            <input type="text" id="newCmdName" placeholder="/команда">
            <textarea id="newCmdResponse" rows="3" placeholder="Ответ бота... Используйте {user} {date} {time}"></textarea>
            <div id="buttonsEditor"></div>
            <button onclick="addButtonField()" class="btn-outline" style="margin-bottom: 12px;">+ Добавить кнопку</button>
            <button onclick="addCommand()">Сохранить команду</button>
        </div>
        
        <!-- Вкладка Профиль -->
        <div class="tab-content" id="tab-profile">
            <textarea id="profileGreeting" rows="3" placeholder="Приветственное сообщение для /start"></textarea>
            <textarea id="profileBio" rows="3" placeholder="Описание бота"></textarea>
            <button onclick="saveProfile()">Сохранить профиль</button>
        </div>
        
        <!-- Вкладка Чаты -->
        <div class="tab-content" id="tab-chats">
            <div id="chatsList"></div>
        </div>
    </div>
</div>

<script>
    let currentAccountId = null;
    let tempButtons = [];
    
    async function loadBots() {
        const res = await fetch('/api/accounts');
        const accounts = await res.json();
        const container = document.getElementById('botsList');
        container.innerHTML = Object.entries(accounts).map(([id, acc]) => `
            <div class="bot-card" onclick="selectBot('${id}', '${acc.name}')">
                <div style="font-weight: 700; font-size: 1.1rem;">🤖 ${escapeHtml(acc.name)}</div>
                <div style="font-size: 12px; color: #8e98b0; margin: 8px 0;">${acc.token ? '🔑 Токен установлен' : '⚠️ Нет токена'}</div>
                <button onclick="event.stopPropagation(); deleteBot('${id}')" class="btn-danger" style="padding: 6px 12px; font-size: 12px;">🗑️ Удалить</button>
            </div>
        `).join('');
    }
    
    async function selectBot(id, name) {
        currentAccountId = id;
        document.getElementById('botPanel').style.display = 'block';
        document.getElementById('selectedBotName').innerText = name;
        
        await loadCommands();
        await loadProfile();
        await loadChats();
    }
    
    async function loadCommands() {
        const res = await fetch(`/api/commands/${currentAccountId}`);
        const commands = await res.json();
        const container = document.getElementById('commandsList');
        container.innerHTML = commands.map((cmd, idx) => `
            <div class="command-item">
                <div>
                    <strong>${escapeHtml(cmd.name)}</strong>
                    <div style="font-size: 12px; color: #8e98b0; margin-top: 4px;">${escapeHtml(cmd.response.substring(0, 80))}</div>
                    <div style="display: flex; gap: 6px; margin-top: 8px;">
                        ${(cmd.buttons || []).map(b => `<span class="badge">🔘 ${escapeHtml(b.text)}</span>`).join('')}
                    </div>
                </div>
                <button onclick="deleteCommand(${idx})" class="btn-danger" style="padding: 6px 12px;">🗑️</button>
            </div>
        `).join('');
    }
    
    async function addCommand() {
        const name = document.getElementById('newCmdName').value.trim();
        const response = document.getElementById('newCmdResponse').value.trim();
        if (!name || !response) return alert('Заполните команду и ответ');
        
        const res = await fetch(`/api/commands/${currentAccountId}`);
        let commands = await res.json();
        commands.push({ name, response, buttons: tempButtons.filter(b => b.text) });
        
        await fetch(`/api/commands/${currentAccountId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(commands)
        });
        
        document.getElementById('newCmdName').value = '';
        document.getElementById('newCmdResponse').value = '';
        tempButtons = [];
        renderButtonsEditor();
        loadCommands();
    }
    
    async function deleteCommand(idx) {
        const res = await fetch(`/api/commands/${currentAccountId}`);
        let commands = await res.json();
        commands.splice(idx, 1);
        await fetch(`/api/commands/${currentAccountId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(commands)
        });
        loadCommands();
    }
    
    function renderButtonsEditor() {
        const container = document.getElementById('buttonsEditor');
        if (!tempButtons.length) {
            container.innerHTML = '<div style="color: #8e98b0; margin: 8px 0;">Нет кнопок</div>';
            return;
        }
        container.innerHTML = tempButtons.map((btn, i) => `
            <div class="buttons-row">
                <input type="text" placeholder="Текст кнопки" value="${escapeHtml(btn.text)}" onchange="updateBtn(${i}, 'text', this.value)">
                <input type="text" placeholder="Данные/URL" value="${escapeHtml(btn.data)}" onchange="updateBtn(${i}, 'data', this.value)">
                <select onchange="updateBtn(${i}, 'type', this.value)">
                    <option value="callback" ${btn.type === 'callback' ? 'selected' : ''}>Callback</option>
                    <option value="url" ${btn.type === 'url' ? 'selected' : ''}>URL</option>
                </select>
                <button onclick="removeBtn(${i})" style="background: #dc3545; padding: 8px 12px;">✖</button>
            </div>
        `).join('');
    }
    
    function addButtonField() {
        tempButtons.push({ text: "Кнопка", type: "callback", data: "data" });
        renderButtonsEditor();
    }
    
    window.updateBtn = (i, field, val) => {
        if (tempButtons[i]) tempButtons[i][field] = val;
        renderButtonsEditor();
    };
    window.removeBtn = (i) => {
        tempButtons.splice(i, 1);
        renderButtonsEditor();
    };
    
    async function loadProfile() {
        const res = await fetch(`/api/profile/${currentAccountId}`);
        const profile = await res.json();
        document.getElementById('profileGreeting').value = profile.greeting || '';
        document.getElementById('profileBio').value = profile.bio || '';
    }
    
    async function saveProfile() {
        const profile = {
            greeting: document.getElementById('profileGreeting').value,
            bio: document.getElementById('profileBio').value
        };
        await fetch(`/api/profile/${currentAccountId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(profile)
        });
        alert('Профиль сохранён');
    }
    
    async function loadChats() {
        const res = await fetch(`/api/chats/${currentAccountId}`);
        const chats = await res.json();
        const container = document.getElementById('chatsList');
        if (!chats.length) {
            container.innerHTML = '<div style="color: #8e98b0;">Нет чатов. Напишите боту первым</div>';
            return;
        }
        container.innerHTML = chats.map(chat => `
            <div class="chat-item">
                <div>
                    <strong>${escapeHtml(chat.userName)}</strong>
                    <div style="font-size: 11px; color: #8e98b0;">ID: ${chat.chatId}</div>
                    <div style="margin-top: 8px;">
                        ${chat.messages.slice(-3).map(m => `<div class="message-bubble" style="font-size: 12px;">${escapeHtml(m.text.substring(0, 50))}</div>`).join('')}
                    </div>
                </div>
                <button onclick="deleteChat('${chat.id}')" class="btn-danger" style="padding: 6px 12px;">🗑️</button>
            </div>
        `).join('');
    }
    
    async function deleteChat(chatKey) {
        if (!confirm('Удалить всю историю чата?')) return;
        await fetch(`/api/chat/${chatKey}`, { method: 'DELETE' });
        loadChats();
    }
    
    async function addBot() {
        const name = document.getElementById('botName').value.trim();
        const token = document.getElementById('botToken').value.trim();
        if (!name || !token) return alert('Заполните имя и токен');
        
        const id = Date.now().toString();
        await fetch('/api/accounts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, name, token })
        });
        document.getElementById('botName').value = '';
        document.getElementById('botToken').value = '';
        loadBots();
    }
    
    async function deleteBot(id) {
        if (!confirm('Удалить бота и все его данные?')) return;
        await fetch(`/api/accounts/${id}`, { method: 'DELETE' });
        if (currentAccountId === id) {
            document.getElementById('botPanel').style.display = 'none';
            currentAccountId = null;
        }
        loadBots();
    }
    
    // Вкладки
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
        });
    });
    
    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    loadBots();
</script>
</body>
  </html>
